{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conversor de Avaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Lista de produtos injetada pelo Django
        const produtos = [
            {% for produto in produtos %}
                { codigo: "{{ produto.codigo }}", descricao: "{{ produto.descricao|escapejs }}" },
            {% endfor %}
        ];

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function filtrarProdutos() {
            const busca = document.getElementById('busca').value.toLowerCase();
            const select = document.getElementById('codigo');
            select.innerHTML = '<option value="">-- Selecione um Produto --</option>';
            produtos.forEach(function(prod) {
                if (prod.codigo.startsWith(busca) || prod.descricao.toLowerCase().includes(busca)) {
                    const option = document.createElement('option');
                    option.value = prod.codigo;
                    option.textContent = prod.codigo + ' - ' + prod.descricao;
                    select.appendChild(option);
                }
            });
        }

        async function converter() {
            const codigo = document.getElementById('codigo').value;
            const quantidade = document.getElementById('quantidade').value;
            const tipo = document.getElementById('tipo_unidade').value;
            const csrftoken = getCookie('csrftoken');
            const resultDiv = document.getElementById('resultado');

            // Limpa o resultado anterior e mostra um loading visual
            resultDiv.innerHTML = '<p class="text-slate-500 font-medium">Calculando conversão...</p>';
            resultDiv.classList.remove('hidden');

            try {
                const res = await fetch(`/api/v1/conversao-avaria/?codigo=${codigo}&quantidade=${quantidade}&tipo_unidade=${tipo}`, {
                    credentials: 'include',
                    headers: { 'X-CSRFToken': csrftoken }
                });
                const data = await res.json();
                
                if (!res.ok) {
                    resultDiv.innerHTML = `<p class="text-red-600 font-semibold">⚠️ Erro: ${data.erro || 'Falha na conversão'}</p>`;
                    resultDiv.classList.replace('bg-slate-50', 'bg-red-50');
                    resultDiv.classList.replace('border-slate-200', 'border-red-200');
                    return;
                }
                
                // Sucesso na conversão
                resultDiv.classList.replace('bg-red-50', 'bg-slate-50');
                resultDiv.classList.replace('border-red-200', 'border-slate-200');
                resultDiv.innerHTML = `
                    <div class="border-b border-slate-200 pb-3 mb-3">
                        <p class="text-xs text-slate-500 uppercase tracking-wider font-bold mb-1">Produto Selecionado</p>
                        <p class="font-bold text-slate-800 text-lg">${data.produto}</p>
                        <p class="text-sm text-slate-600">${data.descricao}</p>
                    </div>
                    <div>
                        <p class="text-sm text-slate-600 mb-3"><span class="font-bold text-slate-800">${data.quantidade_original} ${data.tipo_original}</span> equivale exatamente a:</p>
                        <ul class="space-y-2 font-medium text-slate-700">
                            <li class="flex items-center gap-2">🔹 <span class="text-blue-700">${data.total_unidades || '-'} unidades</span></li>
                            <li class="flex items-center gap-2">📦 <span class="text-blue-700">${data.total_packs || '-'} packs</span></li>
                            <li class="flex items-center gap-2">🚚 <span class="text-blue-700">${data.total_pallets || '-'} pallets</span></li>
                        </ul>
                    </div>
                `;
            } catch (error) {
                resultDiv.classList.replace('bg-slate-50', 'bg-red-50');
                resultDiv.classList.replace('border-slate-200', 'border-red-200');
                resultDiv.innerHTML = `<p class="text-red-600 font-semibold">⚠️ Erro de comunicação com o servidor.</p>`;
            }
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen p-6">

    <div class="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-lg">
        
        <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-200 pb-5 mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Conversor de Avarias</h1>
                <p class="text-sm text-slate-500 mt-1">Calcule equivalências entre Pallets, Packs e Unidades Soltas.</p>
            </div>
            <div>
                <a href="{% url 'painel_gestao' %}" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-300 transition font-medium">
                    Voltar
                </a>
            </div>
        </div>

        <div class="space-y-5">
            <div>
                <label for="busca" class="block text-sm font-semibold text-slate-700 mb-1">Buscar Produto</label>
                <input 
                    type="text" 
                    id="busca" 
                    onkeyup="filtrarProdutos()" 
                    placeholder="Digite o código (ex: 905) ou nome..." 
                    class="w-full border border-slate-300 rounded-lg px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                >
            </div>

            <div>
                <label for="codigo" class="block text-sm font-semibold text-slate-700 mb-1">Produto Selecionado</label>
                <select id="codigo" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">-- Selecione um Produto --</option>
                </select>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="quantidade" class="block text-sm font-semibold text-slate-700 mb-1">Quantidade</label>
                    <input 
                        id="quantidade" 
                        type="number" 
                        step="any" 
                        placeholder="Ex: 10"
                        class="w-full border border-slate-300 rounded-lg px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                    >
                </div>
                <div>
                    <label for="tipo_unidade" class="block text-sm font-semibold text-slate-700 mb-1">Tipo de Unidade</label>
                    <select id="tipo_unidade" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="pallet">Pallet Inteiro</option>
                        <option value="pack">Pack / Fardo</option>
                        <option value="unidade">Unidade Solta</option>
                    </select>
                </div>
            </div>

            <div class="pt-2">
                <button onclick="converter()" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition font-semibold shadow-md">
                    CALCULAR CONVERSÃO
                </button>
            </div>
        </div>

        <div id="resultado" class="hidden mt-6 p-5 bg-slate-50 border border-slate-200 rounded-xl shadow-inner">
            </div>

    </div>
</body>
</html>
