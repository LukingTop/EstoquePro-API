{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importar Planilhas - EstoquePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800 p-6">

    <div class="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-lg mt-4">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-200 pb-5 mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Importar Planilhas</h1>
                <p class="text-sm text-slate-500 mt-1">Sincronize o cadastro de Produtos, Endereços e Ruas.</p>
            </div>
            <div class="flex gap-2">
                <a href="{% url 'dashboard' %}" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg hover:bg-blue-200 transition font-medium whitespace-nowrap text-sm text-center flex items-center shadow-sm">
                    Dashboard
                </a>
                <a href="{% url 'painel_gestao' %}" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-300 transition font-medium whitespace-nowrap text-sm text-center flex items-center shadow-sm">
                    Voltar ao Painel
                </a>
            </div>
        </div>

        {% if msg %}
            <div class="mb-6 p-4 rounded-xl text-sm font-medium border {% if 'sucesso' in msg|lower %}bg-green-50 text-green-800 border-green-200{% else %}bg-red-50 text-red-800 border-red-200{% endif %}">
                {{ msg }}
            </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data" id="uploadForm" class="space-y-6">
            {% csrf_token %}

            <div id="dropArea" class="relative border-2 border-dashed border-slate-300 rounded-xl p-12 flex flex-col items-center justify-center text-center hover:border-blue-400 hover:bg-blue-50 transition-all duration-200 group bg-slate-50">
                
                <div id="fileIcon" class="text-5xl mb-4 text-slate-400 group-hover:text-blue-500 transition-colors group-hover:scale-110 duration-200">
                    📄
                </div>
                
                <span id="fileMsg" class="text-slate-700 font-semibold mb-1 text-lg">Clique ou arraste os arquivos aqui</span>
                <span class="text-slate-500 text-sm">Formatos suportados: .csv, .xlsx</span>
                
                <input 
                    class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" 
                    type="file" 
                    name="file" 
                    id="fileInput"
                    accept=".csv,.xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel"
                    multiple 
                    required
                >
            </div>

            <div class="pt-2">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3.5 rounded-xl hover:bg-blue-700 transition-colors font-bold text-sm shadow-md disabled:bg-slate-400 disabled:cursor-not-allowed">
                    PROCESSAR PLANILHAS
                </button>
            </div>
        </form>

    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileMsg   = document.getElementById('fileMsg');
        const dropArea  = document.getElementById('dropArea');
        const submitBtn = document.getElementById('submitBtn');
        const uploadForm = document.getElementById('uploadForm');
        const fileIcon   = document.getElementById('fileIcon');

        // Quando o usuário seleciona ou solta um arquivo
        fileInput.addEventListener('change', function () {
            if (fileInput.files.length > 1) {
                fileMsg.textContent = fileInput.files.length + ' arquivos selecionados';
            } else if (fileInput.files.length === 1) {
                fileMsg.textContent = fileInput.files[0].name;
            } else {
                fileMsg.textContent = 'Clique ou arraste os arquivos aqui';
            }
            
            // Muda a cor da área para dar feedback visual de que está preenchido
            if(fileInput.files.length > 0) {
                fileMsg.classList.replace('text-slate-700', 'text-blue-700');
                dropArea.classList.add('border-blue-500', 'bg-blue-50');
                fileIcon.classList.replace('text-slate-400', 'text-blue-600');
            } else {
                fileMsg.classList.replace('text-blue-700', 'text-slate-700');
                dropArea.classList.remove('border-blue-500', 'bg-blue-50');
                fileIcon.classList.replace('text-blue-600', 'text-slate-400');
            }
        });

        // Efeitos de Hover ao arrastar o arquivo por cima da tela
        ['dragenter', 'dragover'].forEach(eventName => {
            fileInput.addEventListener(eventName, () => {
                dropArea.classList.add('border-blue-500', 'bg-blue-50');
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            fileInput.addEventListener(eventName, () => {
                if (fileInput.files.length === 0) {
                    dropArea.classList.remove('border-blue-500', 'bg-blue-50');
                }
            });
        });

        // Efeito de carregamento no botão após enviar
        uploadForm.addEventListener('submit', function () {
            submitBtn.innerHTML = '<span class="animate-pulse">Processando arquivos, aguarde...</span>';
            submitBtn.disabled = true;
        });
    </script>

</body>
</html>
