{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exportar Relatório - EstoquePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800 flex items-center justify-center p-4 sm:p-6">

    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-lg w-full max-w-md border border-slate-100">

        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 shadow-sm border border-emerald-200">
                📥
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Exportar Contagens</h1>
            <p class="text-sm text-slate-500 mt-2">Selecione o período para gerar e baixar a planilha consolidada em Excel.</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">
                    Data Inicial
                </label>
                <input
                    type="date"
                    name="data_inicio"
                    required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white shadow-sm text-slate-700"
                >
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">
                    Data Final
                </label>
                <input
                    type="date"
                    name="data_fim"
                    required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white shadow-sm text-slate-700"
                >
            </div>

            <div class="flex flex-col sm:flex-row gap-3 pt-4 border-t border-slate-100">
                <a
                    href="{% url 'painel_gestao' %}"
                    class="w-full sm:w-1/3 bg-slate-200 text-slate-700 text-center py-3 rounded-xl hover:bg-slate-300 transition-colors font-bold text-sm shadow-sm flex items-center justify-center"
                >
                    Voltar
                </a>
                
                <button
                    type="submit"
                    class="w-full sm:w-2/3 bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700 transition-colors font-bold text-sm shadow-md flex justify-center items-center gap-2"
                >
                    Gerar Arquivo Excel
                </button>
            </div>

        </form>

    </div>

</body>
</html>
