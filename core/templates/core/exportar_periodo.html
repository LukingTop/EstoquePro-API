{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exportar por Período</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

        <h1 class="text-2xl font-bold text-slate-800 mb-6">
            Exportar Contagens
        </h1>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">
                    Data Inicial
                </label>

                <input
                    type="date"
                    name="data_inicio"
                    required
                    class="w-full border border-slate-300 rounded-lg px-4 py-2"
                >
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">
                    Data Final
                </label>

                <input
                    type="date"
                    name="data_fim"
                    required
                    class="w-full border border-slate-300 rounded-lg px-4 py-2"
                >
            </div>

            <div class="flex gap-3">

                <button
                    type="submit"
                    class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700"
                >
                    Exportar Excel
                </button>

                <a
                    href="{% url 'painel_gestao' %}"
                    class="flex-1 bg-slate-200 text-center py-2 rounded-lg hover:bg-slate-300"
                >
                    Voltar
                </a>

            </div>

        </form>

    </div>

</body>
</html>
