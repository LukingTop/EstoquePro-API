{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recontagem por Produto - EstoquePro</title>
    <link rel="icon" type="image/png" href="{% static 'core/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <style>
        .select2-container .select2-selection--single {
            height: 50px !important;
            border: 1px solid #cbd5e1 !important;
            border-radius: 8px !important;
            padding: 10px !important;
            font-size: 16px !important;
            display: flex;
            align-items: center;
        }
        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 48px !important;
        }
        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: #1e293b !important;
        }
        
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 15px;
            color: #334155;
            font-weight: 500;
        }
        .radio-option input[type="radio"] {
            transform: scale(1.3);
            cursor: pointer;
        }

        /* Efeito visual para o botão desabilitado */
        button:disabled {
            background-color: #94a3b8 !important;
            cursor: not-allowed !important;
        }
    </style>
</head>
<body>
    <div class="header center-layout">
        <h1>Geração de Missões</h1>
        <p>Selecione a data e o registro histórico para gerar tarefas de recontagem para a equipe.</p>
    </div>

    <div class="center-layout" style="max-width: 600px; margin: 0 auto;">
        
        {% if messages %}
            {% for message in messages %}
                <div style="padding: 15px; margin-bottom: 20px; border-radius: 8px; text-align: center; font-weight: bold; 
                    {% if message.tags == 'error' %} background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171;
                    {% elif message.tags == 'success' %} background-color: #dcfce7; color: #166534; border: 1px solid #4ade80;
                    {% else %} background-color: #fef9c3; color: #854d0e; border: 1px solid #facc15; {% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="card" style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <form method="POST" id="form-recontagem">
                {% csrf_token %}
                
                <label for="data_contagem" style="display: block; margin-bottom: 10px; font-weight: bold; color: #1e293b;">1. Data da Contagem (Filtro):</label>
                <input type="date" id="data_contagem" name="data_contagem" 
                       style="width: 100%; box-sizing: border-box; padding: 15px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 20px; font-size: 16px; color: #1e293b;">

                <label for="contagem_id" style="display: block; margin-bottom: 10px; font-weight: bold; color: #1e293b;">2. Selecione o Registro Base:</label>
                <div style="margin-bottom: 25px;">
                    <select id="contagem_id" name="contagem_id" required style="width: 100%;">
                        <option value=""></option>
                        {% for c in contagens %}
                            <option value="{{ c.id }}" data-date="{{ c.data_hora|date:'Y-m-d' }}">
                                [{{ c.data_hora|date:"H:i" }}] {{ c.codigo_produto }} | Endereço: {{ c.endereco.codigo }} | Qtd: {{ c.pallets }} (Operador: {{ c.operador.username }})
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <label style="display: block; margin-bottom: 10px; font-weight: bold; color: #1e293b;">3. Escopo da Recontagem:</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="escopo" value="unico" checked required>
                        <span><strong>Apenas o Endereço Específico:</strong> Gerar missão apenas para o endereço do registro selecionado.</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="escopo" value="todos" required>
                        <span><strong>Todos os Endereços:</strong> Encontrar e gerar missões para TODOS os locais do galpão onde este produto já foi contado.</span>
                    </label>
                </div>
                
                <button type="submit" id="btn-submit" style="width: 100%; padding: 15px; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s;">
                    GERAR MISSÕES DE RECONTAGEM
                </button>
            </form>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'painel_gestao' %}" style="color: #64748b; text-decoration: none; font-weight: bold;">← Voltar ao Painel</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        $(document).ready(function() {
            var $select = $('#contagem_id');
            var originalOptions = $select.find('option').clone();

            $select.select2({
                placeholder: "Digite código do produto, endereço, ou operador...",
                allowClear: true,
                language: {
                    noResults: function() {
                        return "Nenhum registro encontrado";
                    }
                }
            });

            $('#data_contagem').on('change', function() {
                var selectedDate = $(this).val();
                $select.empty(); 
                $select.append(originalOptions.filter(function() {
                    if (!$(this).val()) return true; 
                    if (!selectedDate) return true;  
                    return $(this).attr('data-date') === selectedDate;
                }).clone());
                $select.val(null).trigger('change');
            });

            // Prevenção de Duplo Clique no Formulário
            $('#form-recontagem').on('submit', function() {
                var $btn = $('#btn-submit');
                $btn.prop('disabled', true);
                $btn.text('GERANDO MISSÕES...');
            });
        });
    </script>
</body>
</html>
