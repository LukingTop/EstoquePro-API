{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Missões de Recontagem - EstoquePro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <style>
        /* Ajuste do Select2 para combinar com o Tailwind */
        .select2-container .select2-selection--single {
            height: 42px !important;
            border: 1px solid #cbd5e1 !important;
            border-radius: 0.5rem !important;
            padding: 0.25rem 0.5rem !important;
            background-color: white !important;
        }
        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 40px !important;
        }
        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: #334155 !important;
            line-height: 26px !important;
        }
        
        /* Abas Estilizadas */
        .tab-button {
            background-color: #f8fafc;
            color: #64748b;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab-button:hover {
            color: #334155;
            background-color: #f1f5f9;
        }
        .tab-button.active {
            background-color: white;
            border-bottom: 2px solid #2563eb;
            color: #1e293b;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-6">

    <div class="max-w-4xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-lg">
        
        <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-200 pb-5 mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Missões de Recontagem</h1>
                <p class="text-sm text-slate-500 mt-1">Gere tarefas de recontagem por produto isolado ou por intervalo de rua.</p>
            </div>
            <div>
                <a href="{% url 'painel_gestao' %}" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-300 transition font-medium whitespace-nowrap">
                    Voltar ao Painel
                </a>
            </div>
        </div>

        {% for message in messages %}
        <div class="mb-6 p-4 rounded-xl text-sm font-medium
            {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
            {% elif message.tags == 'info' %}bg-blue-50 text-blue-800 border border-blue-200
            {% else %}bg-red-50 text-red-800 border border-red-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}

        <div class="flex border-b border-slate-200 mb-6 rounded-t-lg overflow-hidden">
            <button class="tab-button flex-1 py-3 text-sm active" onclick="switchTab('produto')">Filtro por Produto</button>
            <button class="tab-button flex-1 py-3 text-sm" onclick="switchTab('rua')">Filtro por Rua / Intervalo</button>
        </div>

        <div id="tab-produto" class="tab-content">
            <form method="POST" id="form-produto" class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="contagem_id" id="contagem_id_hidden">

                <div class="bg-slate-50 p-5 rounded-xl border border-slate-200">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Selecione o Registro Base:</label>
                    <div class="mb-5">
                        <select id="contagem_select" style="width: 100%;">
                            <option value=""></option>
                            {% for c in contagens %}
                                <option value="{{ c.id }}">
                                    [{{ c.data_hora|date:"d/m H:i" }}] {{ c.codigo_produto }} — End: {{ c.endereco.codigo }} | Qtd: {{ c.pallets }} ({{ c.operador.username }})
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <label class="block text-sm font-semibold text-slate-700 mb-2">Escopo da Recontagem:</label>
                    <div class="space-y-3 bg-white p-4 rounded-lg border border-slate-200">
                        <label class="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-slate-50 transition">
                            <input type="radio" name="escopo" value="unico" checked class="w-4 h-4 text-blue-600"> 
                            <span class="text-sm font-medium text-slate-700">Apenas o endereço selecionado acima</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer p-2 rounded hover:bg-slate-50 transition">
                            <input type="radio" name="escopo" value="todos" class="w-4 h-4 text-blue-600"> 
                            <span class="text-sm font-medium text-slate-700">Todos os endereços onde este produto foi contado</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition font-semibold text-sm shadow-md">
                    GERAR MISSÕES DE PRODUTO
                </button>
            </form>
        </div>

        <div id="tab-rua" class="tab-content hidden">
            <form method="POST" id="form-rua" class="space-y-6">
                {% csrf_token %}
                
                <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 space-y-5">
                    <div>
                        <label for="rua_codigo" class="block text-sm font-semibold text-slate-700 mb-2">Código da Rua Mestre</label>
                        <select name="rua_codigo" id="rua_codigo" required class="w-full border border-slate-300 rounded-lg px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="">-- Selecione a Rua --</option>
                            {% for rua in ruas %}
                                <option value="{{ rua.codigo }}">Rua: {{ rua.codigo }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div style="position: relative;">
                            <label for="endereco_inicio" class="block text-sm font-semibold text-slate-700 mb-2">Endereço Inicial</label>
                            <select name="endereco_inicio" id="endereco_inicio" disabled title="Você precisa selecionar uma rua primeiro" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-100 cursor-not-allowed">
                                <option value="">⚠️ Selecione uma rua primeiro</option>
                            </select>
                        </div>
                        <div style="position: relative;">
                            <label for="endereco_fim" class="block text-sm font-semibold text-slate-700 mb-2">Endereço Final</label>
                            <select name="endereco_fim" id="endereco_fim" disabled title="Você precisa selecionar uma rua primeiro" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-100 cursor-not-allowed">
                                <option value="">⚠️ Selecione uma rua primeiro</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition font-semibold text-sm shadow-md">
                    GERAR MISSÕES DE INTERVALO
                </button>
            </form>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        // ---------- Abas ----------
        function switchTab(tab) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            event.target.classList.add('active');
        }

        // ---------- Select2 para o formulário de produto ----------
        $(document).ready(function() {
            $('#contagem_select').select2({
                placeholder: "Digite código do produto, endereço ou operador...",
                allowClear: true
            });
            $('#contagem_select').on('change', function() {
                $('#contagem_id_hidden').val($(this).val());
            });
        });

        // ---------- Lógica de carregamento de endereços ----------
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        const csrftoken = getCookie('csrftoken');

        const ruaSelect = document.getElementById('rua_codigo');
        const inicioSelect = document.getElementById('endereco_inicio');
        const fimSelect = document.getElementById('endereco_fim');

        // ---------- Aviso visual ao clicar nos selects desabilitados ----------
        [inicioSelect, fimSelect].forEach(select => {
            select.addEventListener('click', function(e) {
                if (this.disabled) {
                    const aviso = document.createElement('div');
                    aviso.innerText = '⚠️ Primeiro selecione uma rua';
                    aviso.style.cssText = 'position:absolute; top:-35px; left:0; background:#fef9c3; color:#854d0e; border:1px solid #fde047; padding:6px 10px; border-radius:6px; font-size:12px; font-weight:600; white-space:nowrap; z-index:50; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);';
                    this.parentNode.style.position = 'relative';
                    this.parentNode.appendChild(aviso);
                    setTimeout(() => aviso.remove(), 2500);
                }
            });
        });

        // ---------- Evento de mudança da rua ----------
        ruaSelect.addEventListener('change', async function () {
            const ruaCodigo = this.value;
            
            if (!ruaCodigo) {
                inicioSelect.disabled = true;
                fimSelect.disabled = true;
                inicioSelect.classList.add('bg-slate-100', 'cursor-not-allowed');
                fimSelect.classList.add('bg-slate-100', 'cursor-not-allowed');
                inicioSelect.innerHTML = '<option value="">⚠️ Selecione uma rua primeiro</option>';
                fimSelect.innerHTML = '<option value="">⚠️ Selecione uma rua primeiro</option>';
                return;
            }

            // Habilita e mostra loading
            inicioSelect.disabled = false;
            fimSelect.disabled = false;
            inicioSelect.classList.remove('bg-slate-100', 'cursor-not-allowed');
            fimSelect.classList.remove('bg-slate-100', 'cursor-not-allowed');
            inicioSelect.innerHTML = '<option value="">Carregando endereços...</option>';
            fimSelect.innerHTML = '<option value="">Carregando endereços...</option>';

            try {
                const response = await fetch(`/api/v1/enderecos/?rua_codigo=${ruaCodigo}`, {
                    credentials: 'include',
                    headers: { 'X-CSRFToken': csrftoken }
                });

                if (!response.ok) throw new Error(`Erro ${response.status}`);

                const data = await response.json();
                const enderecos = data.results || data;

                if (enderecos.length === 0) {
                    inicioSelect.innerHTML = '<option value="">Nenhum endereço encontrado nesta rua</option>';
                    fimSelect.innerHTML = '<option value="">Nenhum endereço encontrado nesta rua</option>';
                    return;
                }

                // Ordenação lógica dos endereços
                enderecos.sort((a, b) => {
                    const aRua = a.rua_num ?? 0, bRua = b.rua_num ?? 0;
                    if (aRua !== bRua) return aRua - bRua;
                    const aPredio = a.predio_num ?? 0, bPredio = b.predio_num ?? 0;
                    if (aPredio !== bPredio) return aPredio - bPredio;
                    const aAndar = a.andar_num ?? 0, bAndar = b.andar_num ?? 0;
                    if (aAndar !== bAndar) return aAndar - bAndar;
                    return (a.posicao_num ?? 0) - (b.posicao_num ?? 0);
                });

                let opcoes = '<option value="">-- Selecione o Endereço --</option>';
                enderecos.forEach(end => {
                    opcoes += `<option value="${end.codigo}">${end.codigo}</option>`;
                });
                
                inicioSelect.innerHTML = opcoes;
                fimSelect.innerHTML = opcoes;
            } catch (error) {
                console.error(error);
                const msg = 'Erro ao carregar da API.';
                inicioSelect.innerHTML = `<option value="">⚠️ ${msg}</option>`;
                fimSelect.innerHTML = `<option value="">⚠️ ${msg}</option>`;
            }
        });
    </script>
</body>
</html>
